name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install system deps for Qt6
        run: sudo apt-get install -y libgl1 libegl1

      - name: Install Python test deps
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest
        env:
          # Suppress Qt platform warnings in headless CI
          QT_QPA_PLATFORM: offscreen
